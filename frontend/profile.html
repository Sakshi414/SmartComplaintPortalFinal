<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<title>My Profile | Smart Complaint Portal</title>

  <link rel="stylesheet" href="css/profile.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="profile-container">

  <!-- LEFT PANEL -->
  <div class="sidebar">
    <div class="profile-card">
      <div class="avatar">👤</div>
      <h2 id="name">User Name</h2>
      <p id="email">email@example.com</p>
    </div>

    <ul class="menu">
      <li onclick="goTo('complaints.html')">📄 My Complaints</li>
      <li onclick="goTo('services.html')">🛠 Services</li>
      <li onclick="goTo('emergency.html')">🚨 Emergency</li>
      <li onclick="logout()" class="logout">🚪 Logout</li>
    </ul>
  </div>

  <!-- RIGHT PANEL -->
  <div class="content">

    <h1>Profile Details</h1>

    <div class="info-grid">
      <div class="card">
        <label>Name</label>
        <p id="userName">-</p>
      </div>

      <div class="card">
        <label>Email</label>
        <p id="userEmail">-</p>
      </div>

      <div class="card">
        <label>Phone</label>
        <p id="userPhone">-</p>
      </div>

      <div class="card">
        <label>Area</label>
        <p id="userArea">-</p>
      </div>

      <div class="card">
        <label>City</label>
        <p id="userCity">-</p>
      </div>

      <div class="card">
        <label>Pincode</label>
        <p id="userPincode">-</p>
      </div>
    </div>

  </div>

</div>

<script src="js/profile.js"></script>

</body>
</html>
