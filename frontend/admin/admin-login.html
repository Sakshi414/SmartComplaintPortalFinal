<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Smart Complaint Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 380px;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 24px;
    }
    h2 i {
      color: #667eea;
      margin-right: 10px;
    }
    input {
      width: 100%;
      padding: 12px 15px;
      margin: 12px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      margin-top: 15px;
      transition: background 0.3s;
    }
    button:hover {
      background: #5568d3;
    }
    .secondary-btn {
      background: #764ba2;
    }
    .secondary-btn:hover {
      background: #6a3e8f;
    }
    .error {
      color: #e74c3c;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
    .success {
      color: #27ae60;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
    .toggle-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
    .toggle-link a {
      color: #667eea;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .toggle-link a:hover {
      text-decoration: underline;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="login-container">
  <!-- Login Form -->
  <div id="loginForm">
    <h2><i class="fa-solid fa-city"></i> Admin Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" class="error"></p>
    <p class="toggle-link">
      New admin? <a onclick="showRegister()">Register here</a>
    </p>
  </div>

  <!-- Register Form -->
  <div id="registerForm" class="hidden">
    <h2><i class="fa-solid fa-user-plus"></i> Admin Register</h2>
    <input id="regName" type="text" placeholder="Full Name">
    <input id="regEmail" type="email" placeholder="Email">
    <input id="regPassword" type="password" placeholder="Password">
    <button class="secondary-btn" onclick="register()">Register</button>
    <p id="regError" class="error"></p>
    <p id="regSuccess" class="success"></p>
    <p class="toggle-link">
      Already have account? <a onclick="showLogin()">Login here</a>
    </p>
  </div>
</div>

<script src="js/admin-login.js"></script>
</body>
</html>
